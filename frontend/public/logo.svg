<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8C99B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C49B6A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="20" y="20" width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="20" y="20" width="200" height="200" rx="16" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <!-- Inner frame -->
  <rect x="35" y="35" width="170" height="170" rx="8" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.25"/>
  <!-- Diamond accent top -->
  <polygon points="120,48 124,55 120,62 116,55" fill="url(#gold)" opacity="0.6"/>
  <!-- Main text -->
  <text x="120" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="3">CLOTHES</text>
  <!-- Decorative lines -->
  <line x1="50" y1="118" x2="88" y2="118" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <line x1="152" y1="118" x2="190" y2="118" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- Sub text -->
  <text x="120" y="142" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="url(#gold)" text-anchor="middle" letter-spacing="8" opacity="0.85">SHOP</text>
  <!-- Tagline -->
  <text x="120" y="170" font-family="Georgia, serif" font-size="9" fill="url(#gold)" text-anchor="middle" letter-spacing="3" font-style="italic" opacity="0.5">FASHION &amp; STYLE</text>
  <!-- Diamond accent bottom -->
  <polygon points="120,178 124,185 120,192 116,185" fill="url(#gold)" opacity="0.6"/>
</svg>
